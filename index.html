  if (n >= 10000000) return '₹' + (n / 10000000).toFixed(2) + ' Cr';

const computeTotals = s => {
  const w = s.vendors[s.winnerIndex];
  const finalUnit = w.rounds[w.rounds.length - 1];
  const startingUnit = s.lastPrice;
  const finalTotal = finalUnit * s.quantity;
  const startingTotal = startingUnit * s.quantity;
  const savings = startingTotal - finalTotal;
  const savingsPct = savings / startingTotal * 100;
  return {
    finalUnit,
    startingUnit,
    finalTotal,
    startingTotal,
    savings,
    savingsPct,
    winner: w
  };
};
